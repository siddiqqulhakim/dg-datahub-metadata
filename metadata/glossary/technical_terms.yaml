# ============================================================
# Glossary: Technical Terms
# ============================================================
# Contains engineering and platform-level technical terms.
# These help data consumers understand how data is processed
# and what platform-level concepts mean.
# ============================================================

version: "1"
kind: glossary

nodes:
  - urn: "urn:li:glossaryNode:Technical"
    name: "Technical"
    description: "Engineering, platform, and data architecture terms."
    owners:
      - type: STEWARD
        id: "urn:li:corpuser:carlos.rodriguez"

  - urn: "urn:li:glossaryNode:Technical__DataQuality"
    name: "Technical__DataQuality"
    parentNode: "urn:li:glossaryNode:Technical"
    description: "Data quality measurement and scoring concepts."
    owners:
