platform: "urn:li:dataPlatform:snowflake"

description: |
  Certified gold-layer AP invoice summary providing monthly aggregated accounts
  payable metrics by vendor, legal entity, cost centre, and invoice status.

  This dataset is the authoritative source for:
  - Executive AP aging reports
  - Cash flow forecasting models
  - Vendor payment performance dashboards
  - CFO monthly close packs

  **Grain:** One row per (fiscal_month, company_code, vendor_id, invoice_status, cost_centre)
  **Metrics included:** total_invoice_count, total_amount_usd, avg_dpo, overdue_amount_usd
  **Latency SLA:** Available by 08:30 UTC each day
  **Consumer SLA:** 99.9% daily availability

