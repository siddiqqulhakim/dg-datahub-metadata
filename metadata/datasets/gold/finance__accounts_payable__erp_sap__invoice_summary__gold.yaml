schema:
  fields:
    - name: "summary_key"
      type: STRING
      nativeDataType: "VARCHAR(80)"
      description: "Surrogate key: MD5(<fiscal_month>|<company_code>|<vendor_id>|<invoice_status>|<cost_centre>)."
