      nativeDataType: "VARCHAR(10)"
      description: "Vendor account number."
      nullable: true

    - name: "vendor_name"
      type: STRING
      nativeDataType: "VARCHAR(100)"
      description: "Vendor company name."
      nullable: true

    - name: "vendor_category"
      type: STRING
      nativeDataType: "VARCHAR(50)"
      description: "Vendor category/segment."
      nullable: true

    - name: "vendor_country_code"
      type: STRING
      nativeDataType: "VARCHAR(2)"
      description: "ISO 3166-1 alpha-2 country code."
      nullable: true

    - name: "cost_centre"
      type: STRING
      nativeDataType: "VARCHAR(10)"
      description: "Cost centre code."
      nullable: true

    - name: "invoice_status"
      type: STRING
      nativeDataType: "VARCHAR(20)"
      description: "Invoice status bucket: OPEN | PAID | OVERDUE | DISPUTED | CANCELLED."
      nullable: false

    - name: "invoice_count"
      type: INTEGER
      nativeDataType: "INTEGER"
      description: "Number of invoices in this aggregation bucket."
      nullable: false

    - name: "total_amount_usd"
      type: DECIMAL
      nativeDataType: "DECIMAL(20,2)"
      description: "Sum of invoice amounts converted to USD."
      nullable: false

    - name: "avg_amount_usd"
      type: DECIMAL
      nativeDataType: "DECIMAL(15,2)"
      description: "Average invoice amount in USD."
      nullable: true

    - name: "min_amount_usd"
      type: DECIMAL
      nativeDataType: "DECIMAL(15,2)"
      description: "Minimum invoice amount in USD."
      nullable: true

    - name: "max_amount_usd"
      type: DECIMAL
      nativeDataType: "DECIMAL(15,2)"
      description: "Maximum invoice amount in USD."
      nullable: true

    - name: "avg_days_payable_outstanding"
      type: DECIMAL
      nativeDataType: "DECIMAL(7,2)"
      description: "Average DPO across all invoices in this bucket."
      nullable: true
      glossaryTerms:
        - urn: "urn:li:glossaryTerm:finance__DaysPayableOutstanding"

    - name: "overdue_invoice_count"
      type: INTEGER
      nativeDataType: "INTEGER"
      description: "Count of overdue invoices in this bucket."
      nullable: false

    - name: "overdue_amount_usd"
      type: DECIMAL
      nativeDataType: "DECIMAL(20,2)"
      description: "Total overdue amount in USD."
      nullable: false

    - name: "_aggregated_at"
      type: TIMESTAMP
      nativeDataType: "TIMESTAMP_NTZ(9)"
      description: "UTC timestamp when this aggregate row was last computed."
      nullable: false

