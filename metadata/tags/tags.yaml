---
# ============================================================
# Tag Catalogue
# ============================================================
# All DataHub tags used across the governance repository.
# Tags must be defined here before they can be referenced in
# dataset YAML files. Referencing an undefined tag will cause
# validate.py to fail.
#
# Tag naming convention:
#   <category>__<subcategory>   (all lowercase, double-underscore-separated)
#
# Dots are NOT used — they conflict with DNS, IP, and infra naming.
# Double underscore (__) is the cross-platform separator.
#
# Categories:
#   sensitivity   — Data sensitivity and classification
#   layer         — Medallion architecture layer
#   source        — Source system origin
#   usage         — Approved usage patterns
#   pii           — PII field-level tagging
#   compliance    — Regulatory compliance flags
#   ingestion     — Ingestion method metadata
#   sla           — SLA tier
#   field         — Field-level structural tags
#   certified     — Certification status
# ============================================================

version: "1"
kind: tags

tags:
  # ── Sensitivity Tags ─────────────────────────────────────────
  - urn: "urn:li:tag:sensitivity__pii"
    name: "sensitivity__pii"
    description: |
      Dataset or field contains Personally Identifiable Information (PII).
      Access must be restricted. Downstream consumers must not expose
      raw PII values. See regulatory term 'PII' for full definition.
    colorHex: "#E53E3E"
    owners:
      - type: STEWARD
        id: "urn:li:corpuser:compliance.lead"

  - urn: "urn:li:tag:sensitivity__financial"
    name: "sensitivity__financial"
    description: |
      Dataset contains financial data. Access is restricted to authorised
      Finance team members and approved analytics consumers.
    colorHex: "#D69E2E"
    owners:
      - type: STEWARD
        id: "urn:li:corpuser:john.smith"

  - urn: "urn:li:tag:sensitivity__confidential"
    name: "sensitivity__confidential"
    description: |
      Dataset is classified CONFIDENTIAL. Not for external sharing.
      Internal access only on a need-to-know basis.
    colorHex: "#C05621"
    owners:
      - type: STEWARD
        id: "urn:li:corpuser:compliance.lead"

  - urn: "urn:li:tag:sensitivity__internal"
    name: "sensitivity__internal"
    description: "Dataset is for internal use only. Not for external distribution."
    colorHex: "#2B6CB0"
    owners:
      - type: STEWARD
        id: "urn:li:corpuser:compliance.lead"

  - urn: "urn:li:tag:sensitivity__public"
    name: "sensitivity__public"
    description: "Dataset is approved for public distribution or open access."
    colorHex: "#276749"
    owners:
      - type: STEWARD
        id: "urn:li:corpuser:compliance.lead"

