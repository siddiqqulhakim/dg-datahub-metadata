---
# ============================================================
# Ownership Registry
# ============================================================
# Central registry mapping GitHub usernames / team slugs to
# DataHub user/group URNs. Used by check_owners.py to validate
# that all owners referenced in dataset YAMLs are known,
# active identities in the DataHub user directory.
#
# MAINTENANCE: Update this file when:
#   - A new team member joins the data team
#   - Someone changes role or leaves
#   - A new GitHub team is created
#
# check_owners.py will FAIL if a dataset references an owner
# URN that is not listed in this registry.
# ============================================================

version: "1"
kind: ownership_registry

