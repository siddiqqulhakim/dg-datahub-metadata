# ── Ownership Type Definitions ───────────────────────────────
# Reference for check_owners.py validation rules
ownership_rules:
  required_per_dataset:
    - type: DATAOWNER
      minimum: 1
      description: "Accountable business owner for the dataset."
    - type: STEWARD
      minimum: 1
      description: "Operational data steward who manages day-to-day quality."
  recommended_per_dataset:
    - type: TECHNICAL_OWNER
      description: "Engineering team or individual who maintains the pipeline."
  gold_layer_additional_requirements:
    - type: DATAOWNER
      minimum: 1
    - type: STEWARD
      minimum: 1
    - certificationBoard: "urn:li:corpGroup:data-certification-board"

