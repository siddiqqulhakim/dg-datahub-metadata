urn: "urn:li:dataProduct:dp_finance_accounts_payable_insights"
name: "dp_finance_accounts_payable_insights"
displayName: "Finance — Accounts Payable Insights"

description: |
  The Accounts Payable Insights Data Product delivers authoritative, certified
  AP analytics to Finance teams, the CFO office, and automated cash flow
  forecasting systems.

  **Business value delivered:**
  - Real-time visibility into outstanding invoice liabilities
  - Vendor payment performance tracking and DPO benchmarking
  - Early payment discount opportunity identification
  - Cash flow forecast inputs (5-day and 30-day rolling windows)
  - SOX audit-ready AP data with full lineage to SAP source

  **Primary consumers:**
  - Finance BI team (Tableau dashboards)
  - CFO Office (Excel/Power BI executive packs)
  - Treasury team (cash flow models)
  - External audit (read-only SOX access)

