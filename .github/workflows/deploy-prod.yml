# ============================================================
# deploy-prod.yml
#
# Purpose: Deploy all metadata to the Production DataHub
#          instance when a release tag (v*.*.*) is pushed
#          to the `main` branch.
#
# Deployment strategy:
#   1. Triggered ONLY by release tags matching v[0-9]+.[0-9]+.[0-9]+
#   2. Requires GitHub Environment "production" with 2 mandatory reviewers
#   3. Full pre-flight validation before any deployment
#   4. Canary approach: deploy in order (domains → tags → glossary
#      → ownership → datasets → policies → data-products)
#   5. Post deployment creates a GitHub Release comment
#
# Secrets required (GitHub Environment: production):
#   - DATAHUB_TOKEN_PROD: DataHub service account token for prod
# ============================================================

name: Deploy to Production

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"

permissions:
  contents: write        # Create release notes
  deployments: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────
  # JOB 1: Pre-flight validation (fail-fast)
  # ─────────────────────────────────────────────────
  pre-flight:
    name: "Pre-flight Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full validation suite
        run: |
          set -e
          echo "▶ Running schema validation..."
          python scripts/validate.py --metadata-dir metadata/ --verbose
          echo "▶ Running naming convention check..."
          python scripts/enforce_naming.py --metadata-dir metadata/
          echo "▶ Running ownership completeness check..."
          python scripts/check_owners.py \
            --metadata-dir metadata/ \
            --owners-registry metadata/ownership/owners.yaml
          echo "✅ All pre-flight checks passed"
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload validation artefacts
        uses: actions/upload-artifact@v4
        with:
          name: prod-preflight-report
          path: reports/
          retention-days: 90

  # ─────────────────────────────────────────────────
  # JOB 2: Production Deployment
  # Requires GitHub Environment "production" approval
  # ─────────────────────────────────────────────────
  deploy-prod:
    name: "Deploy Metadata → Production DataHub"
    runs-on: ubuntu-latest
    needs: pre-flight
    environment: production        # ← Triggers required reviewer approval gate

    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Load environment config ─────────────────────────────
      - name: Load prod environment variables
        run: |
          set -a
          source environments/prod/config.env
          set +a
          echo "DATAHUB_GMS_URL=${DATAHUB_GMS_URL}" >> $GITHUB_ENV
          echo "DATAHUB_ENV=${DATAHUB_ENV}" >> $GITHUB_ENV
          echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      # ── Configure DataHub CLI ───────────────────────────────
      - name: Configure DataHub CLI
        run: |
          datahub init
          cat > ~/.datahubenv << EOF
          gms:
            server: "${DATAHUB_GMS_URL}"
            token: "${DATAHUB_TOKEN}"
          EOF
        env:
          DATAHUB_TOKEN: ${{ secrets.DATAHUB_TOKEN_PROD }}

      # ── Verify connectivity ─────────────────────────────────
      - name: Verify DataHub connectivity
        run: |
          echo "🔗 Verifying prod DataHub connectivity..."
          datahub check --pipeline-name connectivity-check || \
            (echo "::error::Cannot reach prod DataHub GMS at ${DATAHUB_GMS_URL}" && exit 1)

      # ── Deploy in order ─────────────────────────────────────
      - name: "1/7 Deploy Domains"
        run: |
          echo "🚀 [1/7] Deploying domains..."
          for f in metadata/domains/*.yaml; do
            echo "  ✦ ${f}"
            datahub put --file "${f}"
          done

      - name: "2/7 Deploy Tags"
        run: |
          echo "🚀 [2/7] Deploying tags..."
          for f in metadata/tags/*.yaml; do
            [ -f "${f}" ] || continue
            echo "  ✦ ${f}"
            datahub put --file "${f}"
          done

      - name: "3/7 Deploy Glossary"
        run: |
          echo "🚀 [3/7] Deploying glossary..."
          for f in metadata/glossary/*.yaml; do
            echo "  ✦ ${f}"
            datahub put --file "${f}"
          done

      - name: "4/7 Deploy Ownership"
        run: |
          echo "🚀 [4/7] Deploying ownership registry..."
          datahub put --file metadata/ownership/owners.yaml

      - name: "5/7 Deploy Datasets (all layers)"
        run: |
          echo "🚀 [5/7] Deploying datasets..."
          for layer in raw bronze silver gold; do
            for f in metadata/datasets/${layer}/*.yaml; do
              [ -f "${f}" ] || continue
              echo "  ✦ [${layer}] ${f}"
              datahub put --file "${f}"
            done
          done

      - name: "6/7 Deploy Policies"
        run: |
          echo "🚀 [6/7] Deploying policies..."
          for f in metadata/policies/*.yaml; do
            [ -f "${f}" ] || continue
            echo "  ✦ ${f}"
            datahub put --file "${f}"
          done

      - name: "7/7 Deploy Data Products"
        run: |
          echo "🚀 [7/7] Deploying data products..."
          for f in metadata/data-products/*.yaml; do
            [ -f "${f}" ] || continue
            echo "  ✦ ${f}"
            datahub put --file "${f}"
          done

      # ── Run Ingestion Recipes ───────────────────────────────
      - name: Run Production Ingestion Recipes
        run: |
          echo "🚀 Running production ingestion recipes..."
          for recipe in ingestion/sources/*-prod.yaml; do
            [ -f "${recipe}" ] || continue
            echo "  ✦ ${recipe}"
            datahub ingest -c "${recipe}"
          done
        env:
          DATAHUB_GMS_URL: ${{ env.DATAHUB_GMS_URL }}
          DATAHUB_GMS_TOKEN: ${{ secrets.DATAHUB_TOKEN_PROD }}

      # ── Create GitHub Release ───────────────────────────────
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const body = `## 🚀 DataHub Metadata Release ${tag}

            ### Deployment Summary

            | Artefact | Count |
            |---|---|
            | Domains | $(ls metadata/domains/*.yaml 2>/dev/null | wc -l) |
            | Glossary Files | $(ls metadata/glossary/*.yaml 2>/dev/null | wc -l) |
            | Datasets Total | $(find metadata/datasets -name '*.yaml' | wc -l) |
            | Policies | $(ls metadata/policies/*.yaml 2>/dev/null | wc -l) |
            | Data Products | $(ls metadata/data-products/*.yaml 2>/dev/null | wc -l) |

            **Deployed to:** Production DataHub
            **Deployed at:** ${new Date().toISOString()}
            **Deployed by:** ${{ github.actor }}
            `;

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `DataHub Governance ${tag}`,
              body,
              draft: false,
              prerelease: tag.includes('-rc')
            });

      # ── Deployment Job Summary ──────────────────────────────
      - name: Deployment Summary
        if: always()
        run: |
          echo "## 🚀 Production Deployment: ${RELEASE_TAG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release tag:** \`${RELEASE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

